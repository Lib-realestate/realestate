<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>不動産収支管理</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="不動産管理">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid #e0e0d8;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:6px}
.topbar-right{display:flex;align-items:center;gap:6px}
select,input[type=number],input[type=text],input[type=date],input[type=month]{border:0.5px solid #d0d0c8;border-radius:6px;padding:5px 8px;font-size:12px;background:#fff;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif}
.icon-btn{width:32px;height:32px;border-radius:6px;border:0.5px solid #d0d0c8;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#666;transition:all .15s}
.icon-btn:hover{background:#f5f5f0;color:#333}
.icon-btn.active-page{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.nav{display:flex;gap:2px;background:#fff;border-bottom:0.5px solid #e0e0d8;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nb{padding:9px 14px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:12px;color:#666;margin-bottom:-1px;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.nb.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:500}
.nb:hover:not(.active){color:#333}
.content{padding:12px;max-width:960px;margin:0 auto}

/* サブグリッド3列 */
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.col{background:#fff;border:0.5px solid #e0e0d8;border-radius:10px;padding:12px 14px;display:grid;grid-template-rows:auto auto 6px auto auto auto}
.col.single{display:block}
.col-header{padding-bottom:8px}
.col-total{padding:6px 0 8px;border-bottom:1px solid #d0d0c8}
.col-sep{}
.col-row{padding:5px 0;border-bottom:0.5px solid #f0f0e8;display:flex;flex-direction:column;justify-content:center}
.col-row:last-child{border-bottom:none}
.bar-wrap{display:flex;border-radius:3px;overflow:hidden;gap:1px;margin:3px 0 2px}
.bar-i{background:#86efac}.bar-e{background:#fca5a5}
.bar-bg{background:#e0e0d8;border-radius:3px;overflow:hidden;margin:3px 0 2px}

.card{background:#fff;border:0.5px solid #e0e0d8;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.ct{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em}
.flex-b{display:flex;align-items:center;justify-content:space-between}
.flex{display:flex;align-items:center}
.g{color:#16a34a}.r{color:#dc2626}.b{color:#2563eb}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.bg{background:#dcfce7;color:#166534}.br-b{background:#fee2e2;color:#991b1b}
.bb{background:#dbeafe;color:#1e40af}.bz{background:#f3f4f6;color:#4b5563}
.ba-b{background:#f3f4f6;color:#4b5563;font-size:9px}

/* 数字揃えグリッド */
.info-rows{display:table;width:100%;border-collapse:collapse}
.ir{display:table-row}
.ir:not(:last-child) .ic{border-bottom:0.5px solid #f0f0e8}
.ic{display:table-cell;padding:7px 6px;vertical-align:middle}
.ic.lbl{color:#888;font-size:12px;width:210px;padding-right:10px;line-height:1.5}
.ic.amt{white-space:nowrap;vertical-align:middle}
/* 数字ボックス：入力・自動計算で完全同一サイズ */
.nbox{display:inline-block;width:150px;font-size:13px;font-family:'Noto Sans JP',sans-serif;font-variant-numeric:tabular-nums;text-align:right;padding:4px 10px;height:30px;line-height:22px;border-radius:6px;border:0.5px solid #d0d0c8;background:#fff;color:#1a1a1a;vertical-align:middle}
input.nbox{box-sizing:border-box}
input.nbox.ai{border-color:#93c5fd;background:#eff6ff}
span.nbox.auto{background:#f3f4f6;border-color:transparent;font-weight:600}
span.nbox.auto.w400{font-weight:400;font-size:12px}
.nunit{display:inline-block;font-size:12px;color:#888;margin-left:6px;vertical-align:middle;white-space:nowrap}
.nnote{display:inline-block;font-size:11px;color:#888;margin-left:8px;vertical-align:middle}

/* 部屋テーブル */
.rtable{width:100%;border-collapse:collapse;font-size:12px}
.rtable th{padding:7px 8px;text-align:left;font-size:10px;color:#888;border-bottom:0.5px solid #e0e0d8;font-weight:500;background:#fafaf8;white-space:nowrap}
.rtable td{padding:0;border-bottom:0.5px solid #f0f0e8;vertical-align:middle}
.rtable tr.srow td{background:#fafaf8}
.rtable tr.sfull td{color:#888}
.rtable tr:last-child td{border-bottom:none}
.rmain{display:flex;align-items:center;padding:7px 8px;cursor:pointer}
.rmain:hover{background:#f8f8f4}
.rdetail{display:none;background:#f8f8f4;border-top:0.5px solid #ebebeb}
.rdetail.open{display:block}
.eicon{font-size:10px;color:#aaa;transition:transform .15s;display:inline-block;margin-left:3px}
.eicon.open{transform:rotate(180deg)}
/* 内訳：名称右寄せ・金額右揃え */
.ftable{border-collapse:collapse;margin:4px 0 4px 8px}
.ftable td{padding:2px 6px;font-size:11px;border:none;white-space:nowrap}
.ftable .fl{text-align:right;color:#888;min-width:60px}
.ftable .fv{text-align:right;color:#1a1a1a;min-width:80px}

/* 収支テーブル */
.cf-wrap{overflow-x:auto}
.cftable{border-collapse:collapse;font-size:11px;width:100%}
.cftable th{padding:6px 7px;text-align:right;font-size:10px;color:#888;border-bottom:0.5px solid #e0e0d8;font-weight:500;white-space:nowrap;background:#fafaf8}
.cftable th.left{text-align:left}
.cftable td{padding:5px 7px;border-bottom:0.5px solid #f0f0e8;text-align:right;white-space:nowrap;font-size:11px;font-variant-numeric:tabular-nums}
.cftable td.left{text-align:left;color:#888}
.cftable tr.sum-total td{background:#fafaf8;font-weight:500;border-top:1px solid #d0d0c8}
.cftable tr.sub-row td{background:#fafaf8;font-size:10px;color:#888}
.cftable tr.sub-row td.left{padding-left:20px}
.cftable tr.future td{color:#aaa;font-style:italic}
.toggle-row td{cursor:pointer}
.toggle-row:hover td{background:#f5f5f0}

/* 入居状況テーブル */
.occ-table{border-collapse:collapse;font-size:11px;width:100%}
.occ-table th{padding:5px 7px;text-align:center;font-size:10px;color:#888;border-bottom:0.5px solid #e0e0d8;font-weight:500;white-space:nowrap;background:#fafaf8}
.occ-table th.lbl{text-align:left}
.occ-table td{padding:5px 7px;border-bottom:0.5px solid #f0f0e8;text-align:center;white-space:nowrap}
.occ-table td.lbl{text-align:left;font-weight:500}
.occ-table tr.yr-row td{background:#fafaf8;font-weight:500;border-top:1px solid #d0d0c8}
.gsep{border-left:2px solid #d0d0c8 !important}
.pill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.pill-hi{background:#dcfce7;color:#166534}
.pill-lo{background:#fee2e2;color:#991b1b}
.pill-mid{background:#fef9c3;color:#854d0e}

/* ガント */
.gantt-header{display:flex;align-items:center;margin-bottom:2px}
.gantt-lbl{width:52px;flex-shrink:0;font-size:10px;color:#888;text-align:right;padding-right:8px}
.gantt-months-hdr{flex:1;display:grid;grid-template-columns:repeat(12,1fr)}
.gantt-month{text-align:center;font-size:9px;color:#888;border-left:0.5px solid #e0e0d8;padding:1px 0}
.gantt-row{display:flex;align-items:center;height:26px;border-bottom:0.5px solid #f0f0e8}
.gantt-row:last-of-type{border-bottom:none}
.gantt-rowlbl{width:52px;flex-shrink:0;font-size:11px;font-weight:500;text-align:right;padding-right:8px}
.gantt-cells{flex:1;display:grid;grid-template-columns:repeat(12,1fr);height:14px}
.gcell{border-left:0.5px solid #e0e0d8}
.gcell.occ{background:#86efac}
.gcell.vac{background:#fca5a5;opacity:.4}
.gantt-pct{width:46px;text-align:right;font-size:11px;padding-right:4px}
.gantt-overall{display:flex;align-items:center;padding:7px 0 4px;border-top:1px solid #d0d0c8;margin-top:4px}

/* 分析タブ */
.sec-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 14px;border-bottom:0.5px solid #f0f0e8}
.sec-toggle:hover{background:#fafaf8}
.sec-body{overflow:hidden;transition:max-height .3s ease}
.loan-seg{background:#fafaf8;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:0.5px solid #e0e0d8}
.period-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;background:#fff;border:0.5px solid #d0d0c8;color:#888;margin-bottom:8px}
.col-head{font-size:11px;font-weight:500;color:#888;padding-bottom:6px;margin-bottom:8px;border-bottom:0.5px solid #e0e0d8}

/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:22px 24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;color:#888;margin-bottom:4px;display:block}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn{padding:6px 14px;border:0.5px solid #d0d0c8;border-radius:6px;background:none;cursor:pointer;font-size:12px;color:#333;font-family:'Noto Sans JP',sans-serif}
.btn:hover{background:#f5f5f0}
.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
.btn-primary:hover{background:#1d4ed8}
.btn-b{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-add{padding:4px 12px;border:0.5px solid #93c5fd;border-radius:6px;background:#dbeafe;color:#1e40af;cursor:pointer;font-size:11px;font-family:'Noto Sans JP',sans-serif}
.btn-sm{padding:3px 10px;border:0.5px solid #d0d0c8;border-radius:6px;background:none;cursor:pointer;font-size:11px;color:#666;font-family:'Noto Sans JP',sans-serif}

/* アップロード */
.upload-zone{border:2px dashed #d0d0c8;border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:#fafaf8;margin-bottom:10px}
.upload-zone:hover{border-color:#2563eb;background:#eff6ff}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.proc-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#fff;border:0.5px solid #e0e0d8;border-radius:8px;margin-bottom:6px}
.proc-info{flex:1;min-width:0}
.proc-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proc-path{font-size:10px;color:#888;margin-top:2px}
.pbar{height:3px;background:#e0e0d8;border-radius:2px;margin-top:4px;overflow:hidden}
.pfill{height:3px;border-radius:2px;transition:width .4s}
.pfill.analyzing{background:#f59e0b;width:40%;animation:pulse 1.5s infinite}
.pfill.uploading{background:#2563eb;width:70%}
.pfill.done{background:#16a34a;width:100%}
.pfill.error{background:#dc2626;width:100%}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.spinner{width:14px;height:14px;border:2px solid #e0e0d8;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;margin-top:2px}
@keyframes spin{to{transform:rotate(360deg)}}
.unclassified-item{background:#fffbeb;border:0.5px solid #fde68a;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.uc-controls{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.file-cat-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.fct{padding:4px 12px;border:0.5px solid #d0d0c8;border-radius:20px;font-size:11px;cursor:pointer;background:#fff;color:#666;font-family:'Noto Sans JP',sans-serif}
.fct.active{background:#2563eb;color:#fff;border-color:#2563eb}

#toastArea{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:200}
.toast{background:#fff;border:0.5px solid #e0e0d8;border-radius:8px;padding:10px 14px;font-size:12px;min-width:220px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);animation:slideIn .3s ease}
.toast.success{border-left:3px solid #16a34a}.toast.error{border-left:3px solid #dc2626}.toast.info{border-left:3px solid #2563eb}
@keyframes slideIn{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f0;padding:24px}
.auth-card{background:#fff;border:0.5px solid #e0e0d8;border-radius:16px;padding:40px 36px;max-width:400px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.auth-icon{width:56px;height:56px;background:#2563eb;border-radius:14px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
.auth-title{font-size:20px;font-weight:700;margin-bottom:8px}
.auth-sub{color:#666;font-size:13px;line-height:1.7;margin-bottom:28px}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;border-radius:8px;background:#fff;color:#333;font-size:14px;font-weight:500;border:0.5px solid #d0d0c8;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.btn-google:hover{box-shadow:0 2px 8px rgba(0,0,0,.15)}
.drive-bar{background:#fff;border-bottom:0.5px solid #e0e0d8;padding:5px 14px;font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.drive-dot{width:6px;height:6px;border-radius:50%;background:#d0d0c8;flex-shrink:0}
.drive-dot.on{background:#16a34a}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 8px;text-align:left;font-size:10px;color:#888;border-bottom:0.5px solid #e0e0d8;font-weight:500;white-space:nowrap}
td{padding:7px 8px;border-bottom:0.5px solid #f0f0e8;color:#1a1a1a;vertical-align:top}
tr:last-child td{border-bottom:none}
@media(max-width:600px){.summary-grid{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <div class="auth-title">不動産収支管理</div>
    <div class="auth-sub">Google アカウントでログインして<br>Google Drive と連携します</div>
    <button class="btn-google" onclick="handleAuth()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google でログイン
    </button>
  </div>
</div>

<div id="appScreen" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <select id="propSel" onchange="switchProp()" style="min-width:140px"></select>
      <select id="yearSel" onchange="renderCurrent()" style="min-width:74px"><option>2025年</option><option>2024年</option><option>2023年</option></select>
      <select id="monthSel" onchange="renderCurrent()" style="min-width:60px">
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5">5月</option><option value="6" selected>6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="iconUpload" title="ファイルアップロード" onclick="showIconPage('upload')" aria-label="ファイルアップロード"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg></button>
      <button class="icon-btn" id="iconFiles" title="ファイル一覧" onclick="showIconPage('files')" aria-label="ファイル一覧"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></button>
      <button class="icon-btn" id="iconSettings" title="設定" onclick="showIconPage('settings')" aria-label="設定"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <span id="userEmail" style="font-size:10px;color:#888;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    </div>
  </div>
  <div class="drive-bar"><div class="drive-dot" id="driveDot"></div><span id="driveStatus">未接続</span></div>
  <div class="nav" id="mainNav"></div>
  <div class="content" id="pages"></div>
</div>

<!-- 物件追加モーダル -->
<div class="modal-overlay" id="addPropModal">
  <div class="modal">
    <div class="modal-title">物件を追加</div>
    <div class="form-group"><label class="form-label">物件名 *</label><input type="text" id="newPropName" placeholder="例: 三恵マンション" style="width:100%"></div>
    <div class="form-group"><label class="form-label">種別 *</label><select id="newPropType" style="width:100%"><option value="区分">区分マンション</option><option value="1棟">1棟マンション</option><option value="戸建">一戸建て</option></select></div>
    <div class="grid2">
      <div class="form-group"><label class="form-label">取得価格（円）</label><input type="number" id="newPropPrice" placeholder="18000000" style="width:100%"></div>

      const r=await gapi.client.drive.about.get({fields:'user'});

function renderAnalysis(){
  const isAll=currentProp==='all';
  if(isAll){document.getElementById('pages').innerHTML='<div class="card" style="text-align:center;padding:32px;color:#888">個別物件を選択してください</div>';return;}
  const pi=parseInt(currentProp);
  const p=properties[pi];if(!p)return;

  const tc=p.price+(p.reform||0)+(p.miscCost||0);
  const sf=tc-(p.loan||0);
  const pr=p.price+(p.reform||0);
  const segs=p.loanSegs||[{id:0,startYM:'2022-01',rate:1.5,years:35,loan:p.loan}];

  // CCR計算
  const acq=p.acquireDate?p.acquireDate.slice(0,7):nowYM();
  const elapsed=Math.max(1,mdiff(acq,nowYM()));
  const annI=getAnnualI(pi),annE=getAnnualE(pi);
  const cumNet=elapsed>0?(annI-annE)/12*elapsed:0;
  const avgAnnualNet=Math.round(cumNet/elapsed*12);
  const gy=(r,b)=>b>0?(r*12/b*100).toFixed(2)+'%':'—';
  const ccrOrig=sf>0?(p.origNet/sf*100).toFixed(2)+'%':'—';
  const ccrCurr=sf>0&&avgAnnualNet>0?(avgAnnualNet/sf*100).toFixed(2)+'%':'—';

  // ローン返済計算
  function cm(principal,rate,years){const r=rate/100/12,n=years*12;if(r===0||n<=0)return principal/Math.max(n,1);return principal*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);}

  const segHTML=segs.map((seg,i)=>{
    const now=nowYM(),isLast=i===segs.length-1;
    let endLbl='現在',dur=mdiff(seg.startYM||nowYM(),now);
    if(!isLast&&segs[i+1]){const ns=segs[i+1].startYM,[ny,nm]=ns.split('-').map(Number);const pm=nm===1?12:nm-1,py=nm===1?ny-1:ny;endLbl=ml(`${py}-${String(pm).padStart(2,'0')}`);dur=mdiff(seg.startYM,ns);}
    const mp=cm(seg.loan,seg.rate,seg.years);
    const mi=seg.loan*(seg.rate/100/12);
    const mk=mp-mi;
    const ap=mp*12;
    const tp=mp*seg.years*12;
    const ti=tp-seg.loan;
    const currRentFull=p.rooms.reduce((s,r)=>s+r.items.reduce((ss,it)=>ss+it.amt,0),0);
    const ratio=ap/(currRentFull*12)*100;
    const rc=ratio<=40?'#16a34a':ratio<=50?'#f59e0b':'#dc2626';
    return`<div class="loan-seg">
      <div class="flex-b" style="margin-bottom:6px">
        <span style="font-size:12px;font-weight:500">${i===0?'当初条件':'変更条件 '+i}${i>0?`<span class="badge" style="background:#fef9c3;color:#854d0e;margin-left:6px">借り換え・金利変更</span>`:''}</span>
      </div>
      <div class="period-badge">📅 ${ml(seg.startYM)} 〜 ${endLbl}（${dur}ヶ月）</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 110px 90px;gap:10px;align-items:end;margin-top:6px">
        <div><div style="font-size:10px;color:#888;margin-bottom:3px">${i===0?'借入額':'変更時残債'} <span class="badge" style="background:#dbeafe;color:#1e40af;font-size:9px">${i===0?'AI':'手入力'}</span></div>
          <span class="nbox auto">${fmt(seg.loan)}</span></div>
        <div><div style="font-size:10px;color:#888;margin-bottom:3px">開始年月 <span class="badge bz" style="font-size:9px">手入力</span></div>
          <input type="month" value="${seg.startYM||nowYM()}" style="width:100%;height:30px;font-size:12px" onchange="updateLoanSeg(${pi},${i},'startYM',this.value)"></div>
        <div><div style="font-size:10px;color:#888;margin-bottom:3px">金利 <span class="badge" style="background:${i===0?'#dbeafe':'#f3f4f6'};color:${i===0?'#1e40af':'#4b5563'};font-size:9px">${i===0?'AI':'手入力'}</span></div>

function togSec(id){const b=document.getElementById('body_'+id),ic=document.getElementById('ic_'+id);const op=b.style.maxHeight!=='0px'&&b.style.maxHeight!=='0';b.style.maxHeight=op?'0':'1200px';if(ic)ic.textContent=op?'▼':'▲';}
function updatePropField(pi,key,val){properties[pi][key]=val;saveProps();}
function updateLoanSeg(pi,si,key,val){if(!properties[pi].loanSegs)return;properties[pi].loanSegs[si][key]=val;saveProps();renderAnalysis();}

/* ── 出口戦略 ── */
function renderExit(){
  if(currentProp==='all')return;
  const p=properties[parseInt(currentProp)];if(!p||!p.price)return;
  document.getElementById('pages').innerHTML=`<div class="card"><div class="ct" style="margin-bottom:12px">売却シミュレーション — ${p.name}</div>
  <div class="grid2" style="margin-bottom:12px">
    <div><div style="font-size:11px;color:#888;margin-bottom:3px">売却想定価格（円）</div><input type="number" id="exitPrice" value="${Math.round(p.price*1.2)}" style="width:100%;font-size:14px;text-align:right" oninput="calcExit()"></div>
    <div><div style="font-size:11px;color:#888;margin-bottom:3px">課税区分</div><select id="taxType" style="width:100%" onchange="calcExit()"><option value="longPersonal">個人 長期（20.315%）</option><option value="shortPersonal">個人 短期（39.63%）</option><option value="corporate">法人（実効税率34%）</option></select></div>
  </div>
  <div class="grid2"><div><div style="font-size:11px;font-weight:500;color:#888;margin-bottom:8px">費用内訳</div><div id="exitBreakdown"></div></div>
    <div><div class="card" style="padding:10px 12px;margin:0 0 8px"><div style="font-size:10px;color:#888;margin-bottom:3px">手取り利益</div><div style="font-size:18px;font-weight:500" class="g" id="exitNet">—</div></div>
      <div class="card" style="padding:10px 12px;margin:0"><div style="font-size:10px;color:#888;margin-bottom:3px">自己資金回収率</div><div style="font-size:18px;font-weight:500" class="b" id="exitRecovery">—</div></div>
    </div></div>
  <div style="margin-top:12px"><div class="ct" style="margin-bottom:8px">売却価格別 手取り試算</div><div style="position:relative;height:150px"><canvas id="exitChart"></canvas></div></div></div>`;
  calcExit();
}

function calcExit(){
  const pi=parseInt(currentProp),p=properties[pi];if(!p)return;
  const price=parseInt(document.getElementById('exitPrice').value)||0;
  const taxType=document.getElementById('taxType').value;
  const agentFee=Math.round((price*.03+60000)*1.1),taxAdj=35000,debt=p.debt||Math.round((p.loan||0)*.75);
  const gain=price-p.price,rates={longPersonal:.20315,shortPersonal:.3963,corporate:.34};
  const cgTax=gain>0?Math.round(gain*rates[taxType]):0,net=price-agentFee-taxAdj-debt-cgTax;
  const tc=(p.price||0)+(p.reform||0)+(p.miscCost||0);
  const sf=tc-(p.loan||0);
  document.getElementById('exitBreakdown').innerHTML=[['売却価格',fmt(price),''],['仲介手数料',fmt(agentFee),'r'],['固都税精算',fmt(taxAdj),'r'],['残債',fmt(debt),'r'],['譲渡所得税',fmt(cgTax),'r']]
    .map(([k,v,c])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid #f0f0e8;font-size:12px"><span style="color:#888">${k}</span><span class="${c}" style="font-weight:500">${c==='r'?'▲':''}${v}</span></div>`).join('')+
    `<div style="display:flex;justify-content:space-between;padding:8px 0;font-weight:700;font-size:13px;border-top:0.5px solid #d0d0c8;margin-top:4px"><span>手取り</span><span class="${net>=0?'g':'r'}">${net<0?'▲':''}${fmt(net)}</span></div>`;
  document.getElementById('exitNet').textContent=(net<0?'▲':'')+fmt(net);
  document.getElementById('exitRecovery').textContent=(sf>0?Math.round(net/sf*100):0)+'%';
  dc('exitChart');
  const prices=[.8,.9,1,1.1,1.2].map(r=>Math.round(price*r));
  const nets=prices.map(pr=>{const f=Math.round((pr*.03+60000)*1.1),g=pr-p.price,t=g>0?Math.round(g*rates[taxType]):0;return pr-f-taxAdj-debt-t;});
  charts.exitChart=new Chart(document.getElementById('exitChart'),{type:'bar',data:{labels:prices.map(pr=>'¥'+(pr/10000000).toFixed(1)+'千万'),datasets:[{data:nets,backgroundColor:nets.map(v=>v>=0?'rgba(134,239,172,.5)':'rgba(252,165,165,.5)'),borderColor:nets.map(v=>v>=0?'#16a34a':'#dc2626'),borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'¥'+(v/10000)+'万',font:{size:10}}},x:{ticks:{font:{size:10}}}}}});
}

/* ── Drive API ── */
async function findOrCreateFolder(name,parentId){
  const lockKey=`${parentId}/${name}`;
  if(folderCreatingLock[lockKey]){await folderCreatingLock[lockKey];const r=await gapi.client.drive.files.list({q:`name='${name}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,fields:'files(id)',spaces:'drive'});return r.result.files[0]?.id;}
  let resolveLock;folderCreatingLock[lockKey]=new Promise(r=>{resolveLock=r;});
  try{const r=await gapi.client.drive.files.list({q:`name='${name}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,fields:'files(id,name)',spaces:'drive'});
    if(r.result.files.length>0){for(let i=1;i<r.result.files.length;i++){try{await gapi.client.drive.files.delete({fileId:r.result.files[i].id});}catch{}}return r.result.files[0].id;}
    const cr=await gapi.client.drive.files.create({resource:{name,mimeType:'application/vnd.google-apps.folder',parents:[parentId]},fields:'id'});return cr.result.id;
  }finally{resolveLock();delete folderCreatingLock[lockKey];}
}

async function ensurePropFolders(prop){
  if(prop._creating)return prop;prop._creating=true;
  try{prop.folderId=await findOrCreateFolder(prop.name,DRIVE_FOLDER_ID);prop.subFolders={};
    for(const sub of SUB_FOLDERS)prop.subFolders[sub]=await findOrCreateFolder(sub,prop.folderId);
    saveProps();return prop;
  }finally{prop._creating=false;}
}

async function createFolders(propId){const prop=properties.find(p=>p.id===propId);if(!prop)return;showToast('フォルダを作成・確認中…','info');try{await ensurePropFolders(prop);showToast('フォルダ作成完了','success');renderAnalysis();}catch(e){showToast('エラー: '+e.message,'error');}}

async function uploadToDrive(file,folderId,fileName){
  const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name:fileName,parents:[folderId]})],{type:'application/json'}));form.append('file',file);
  const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink',{method:'POST',headers:{Authorization:'Bearer '+accessToken},body:form});return await r.json();
}

async function moveFileToDrive(fileId,newFolderId){const r=await gapi.client.drive.files.get({fileId,fields:'parents'});await gapi.client.drive.files.update({fileId,addParents:newFolderId,removeParents:r.result.parents.join(','),fields:'id,parents'});}

async function loadDriveFiles(){
  if(!accessToken)return;
  try{driveFiles=[];
    for(const prop of properties){if(!prop.folderId)continue;
      for(const[folderName,folderId]of Object.entries(prop.subFolders||{})){if(!folderId)continue;
        const r=await gapi.client.drive.files.list({q:`'${folderId}' in parents and trashed=false`,fields:'files(id,name,createdTime,webViewLink,mimeType)',orderBy:'createdTime desc',pageSize:100});
        for(const f of r.result.files)driveFiles.push({...f,propId:prop.id,propName:prop.name,folderName,folderId});}}
    driveFiles.sort((a,b)=>new Date(b.createdTime)-new Date(a.createdTime));
  }catch(e){console.error(e);}
}

/* ── ファイル操作 ── */
function setupDragDrop(){const zone=document.getElementById('dropZone');if(!zone)return;zone.addEventListener('dragover',e=>{e.preventDefault();zone.style.borderColor='#2563eb';});zone.addEventListener('dragleave',()=>{zone.style.borderColor='';});zone.addEventListener('drop',e=>{e.preventDefault();zone.style.borderColor='';handleFiles(e.dataTransfer.files);});}

async function handleFiles(files){if(!accessToken){showToast('先にGoogle Driveにログインしてください','error');return;}for(const file of files)await analyzeAndConfirm(file);}

async function analyzeAndConfirm(file){
  const id='f_'+Date.now()+Math.random().toString(36).slice(2);
  const list=document.getElementById('procList');
  if(list){const el=document.createElement('div');el.className='proc-item';el.id=id;el.innerHTML=`<div class="proc-info"><div class="proc-name">${file.name}</div><div class="proc-path" id="${id}_p">解析中…</div><div class="pbar"><div class="pfill analyzing" id="${id}_b"></div></div></div><div class="spinner" id="${id}_s"></div><span class="badge bz" id="${id}_badge">解析中</span>`;list.prepend(el);}
  try{const text=await extractText(file);const detectedProp=detectProperty(file.name,text);const detectedCat=detectCategory(file.name,text);const detectedDate=extractDate(file.name,text)||today();pendingUpload={file,id,detectedProp,detectedCat,detectedDate};showClassifyModal(file.name,detectedProp,detectedCat,detectedDate);}
  catch(e){updateProc(id,'error','解析エラー');}
}

function showClassifyModal(filename,prop,cat,date){
  const propOptions=properties.map((p,i)=>`<option value="${i}" ${prop&&prop.id===p.id?'selected':''}>${p.name}</option>`).join('');
  const catOptions=SUB_FOLDERS.map(s=>`<option value="${s}" ${s===cat?'selected':''}>${s}</option>`).join('');
  document.getElementById('classifyContent').innerHTML=`<div style="font-size:12px;color:#888;margin-bottom:12px">ファイル名: <strong>${filename}</strong></div>
    <div class="form-group"><label class="form-label">物件</label><select id="classifyProp" style="width:100%"><option value="">— 未分類 —</option>${propOptions}</select></div>
    <div class="form-group"><label class="form-label">カテゴリ</label><select id="classifyCat" style="width:100%">${catOptions}</select></div>
    <div class="form-group"><label class="form-label">日付（発行日・入金日・請求日）</label><input type="date" id="classifyDate" value="${date}" style="width:100%"></div>
    <div style="font-size:11px;color:#888;margin-top:4px">内容を解析して自動判定しました。必要に応じて修正してください。</div>`;
  document.getElementById('classifyModal').classList.add('open');
}

async function confirmUpload(){
  closeModal('classifyModal');if(!pendingUpload)return;
  const{file,id}=pendingUpload;const propIdx=document.getElementById('classifyProp').value;const cat=document.getElementById('classifyCat').value;const date=document.getElementById('classifyDate').value;
  if(propIdx===''){updateProc(id,'error','物件未選択 → 未分類トレイへ');unclassifiedItems.push({file,name:file.name,cat,date,id});showToast('未分類トレイに追加しました','info');pendingUpload=null;return;}
  const prop=properties[parseInt(propIdx)];updateProc(id,'uploading',`${prop.name} / ${cat} へアップロード中…`);
  try{const up=await ensurePropFolders(prop);const targetId=up.subFolders[cat]||up.subFolders['その他'];const result=await uploadToDrive(file,targetId,`${date.replace(/-/g,'')}_${file.name}`);updateProc(id,'done',`✓ ${prop.name} / ${cat}`,result.webViewLink);showToast(`${file.name} を振り分けました`,'success');await loadDriveFiles();}
  catch(e){updateProc(id,'error','エラー: '+e.message);showToast('アップロードに失敗しました','error');}
  pendingUpload=null;
}

async function classifyItem(idx){
  const item=unclassifiedItems[idx];if(!item)return;const propIdx=document.getElementById(`ucProp${idx}`).value;const cat=document.getElementById(`ucCat${idx}`).value;const date=document.getElementById(`ucDate${idx}`).value;
  if(propIdx===''){showToast('物件を選択してください','error');return;}const prop=properties[parseInt(propIdx)];
  try{showToast('アップロード中…','info');const up=await ensurePropFolders(prop);const targetId=up.subFolders[cat]||up.subFolders['その他'];await uploadToDrive(item.file,targetId,`${(date||today()).replace(/-/g,'')}_${item.name}`);unclassifiedItems.splice(idx,1);showToast(`${item.name} を振り分けました`,'success');await loadDriveFiles();renderUpload();}
  catch(e){showToast('エラー: '+e.message,'error');}
}

function updateProc(id,status,path,link){
  const labels={analyzing:'解析中',uploading:'転送中',done:'完了',error:'エラー'};const colors={analyzing:'ba',uploading:'bb',done:'bg',error:'br-b'};
  const p=document.getElementById(id+'_p');if(p)p.textContent=path||'';
  const badge=document.getElementById(id+'_badge');if(badge){badge.className='badge '+colors[status];badge.textContent=labels[status]||status;}
  const bar=document.getElementById(id+'_b');if(bar)bar.className='pfill '+status;
  const spin=document.getElementById(id+'_s');if(spin)spin.style.display=(status==='done'||status==='error')?'none':'';
  if(status==='done'&&link){const a=document.createElement('a');a.href=link;a.target='_blank';a.textContent='開く';a.style.cssText='font-size:11px;color:#2563eb;margin-left:8px';document.getElementById(id)?.appendChild(a);}
}

async function extractText(file){return new Promise(resolve=>{const reader=new FileReader();reader.onload=e=>{try{resolve(e.target.result.replace(/[^\u3000-\u9FFF\uFF00-\uFFEF\u0020-\u007E]/g,' ').slice(0,2000));}catch{resolve('');}};reader.onerror=()=>resolve('');file.type.includes('text')||file.name.endsWith('.csv')?reader.readAsText(file,'UTF-8'):reader.readAsBinaryString(file);});}

function detectProperty(name,text){const combined=(name+' '+(text||'')).toLowerCase();return[...properties].sort((a,b)=>b.name.length-a.name.length).find(p=>[p.name,p.name.replace(/[　 ]/g,'')].some(v=>combined.includes(v.toLowerCase())))||null;}
function detectCategory(name,text){const c=(name+' '+(text||'')).toLowerCase();if(/家賃|賃料|収入|rent|income|送金|振込|入金/.test(c))return'収入';if(/固定資産税|税金|tax/.test(c))return'税金';if(/契約|重要事項|lease|contract/.test(c))return'契約書';if(/修繕|管理費|支出|費|ローン|保険/.test(c))return'支出';return'その他';}
function extractDate(name,text){const c=name+' '+(text||'');const pats=[/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/,/令和(\d+)年(\d{1,2})月(\d{1,2})日/,/(\d{4})(\d{2})(\d{2})/];for(const pat of pats){const m=c.match(pat);if(m){try{if(pat.source.includes('令和'))return`${2018+parseInt(m[1])}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;if(parseInt(m[1])>1900)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;}catch{}}}return null;}

function renderUpload(){
  let html=`<div class="card"><div class="ct" style="margin-bottom:10px">ファイルをアップロード</div>
  <div class="upload-zone" id="dropZone"><input type="file" multiple accept=".pdf,.xlsx,.xls,.csv,.docx,.doc,.jpg,.jpeg,.png" onchange="handleFiles(this.files)">
    <div style="font-size:28px;margin-bottom:10px">📂</div>
    <div style="font-size:13px;font-weight:500;margin-bottom:4px">ファイルをドロップ、またはタップして選択</div>
    <div style="font-size:11px;color:#888;margin-bottom:8px">ファイル内容を解析して物件・カテゴリ・日付を自動判定</div>
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">${['PDF','Excel','CSV','Word','画像'].map(t=>`<span style="padding:2px 8px;border:0.5px solid #d0d0c8;border-radius:20px;font-size:11px;color:#666">${t}</span>`).join('')}</div>
  </div><div id="procList"></div></div>`;
  if(unclassifiedItems.length>0){
    html+=`<div class="card"><div class="ct" style="color:#b45309;margin-bottom:10px">未分類トレイ（${unclassifiedItems.length}件）</div>`;
    unclassifiedItems.forEach((item,idx)=>{const propOptions=properties.map((p,i)=>`<option value="${i}">${p.name}</option>`).join('');const catOptions=SUB_FOLDERS.map(s=>`<option value="${s}" ${s===item.cat?'selected':''}>${s}</option>`).join('');html+=`<div class="unclassified-item"><div style="font-size:12px;font-weight:500">${item.name}</div><div class="uc-controls"><select id="ucProp${idx}" style="flex:1"><option value="">物件を選択</option>${propOptions}</select><select id="ucCat${idx}">${catOptions}</select><input type="date" id="ucDate${idx}" value="${item.date||today()}" style="width:130px"><button class="btn btn-b" onclick="classifyItem(${idx})">振り分け</button></div></div>`;});
    html+=`</div>`;
  }
  document.getElementById('pages').innerHTML=html;setTimeout(setupDragDrop,50);
}

function renderFiles(){
  const filtered=currentFileFilter==='all'?driveFiles:driveFiles.filter(f=>f.folderName===currentFileFilter);
  document.getElementById('pages').innerHTML=`<div class="flex-b" style="margin-bottom:10px"><div class="file-cat-tabs">${['all',...SUB_FOLDERS].map(c=>`<button class="fct ${currentFileFilter===c?'active':''}" onclick="filterFiles('${c}',this)">${c==='all'?'すべて':c}</button>`).join('')}</div><button class="btn" onclick="loadDriveFiles().then(renderFiles)">更新</button></div>
  <div class="card" style="padding:0"><div style="overflow-x:auto"><table style="min-width:440px"><thead><tr><th>ファイル名</th><th>物件</th><th>カテゴリ</th><th>日付</th><th>操作</th></tr></thead><tbody>${filtered.length===0?'<tr><td colspan="5" style="text-align:center;padding:24px;color:#888">ファイルがありません</td></tr>':filtered.map(f=>{const date=f.createdTime?new Date(f.createdTime).toLocaleDateString('ja-JP'):'—';return`<tr><td><a href="${f.webViewLink}" target="_blank" style="color:#2563eb;text-decoration:none;font-size:12px">${f.name.slice(0,24)}</a></td><td style="font-size:11px;color:#888">${f.propName.slice(0,10)}</td><td><span class="badge bz">${f.folderName}</span></td><td style="font-size:11px;color:#888">${date}</td><td><button class="btn" style="font-size:10px;padding:3px 8px" onclick="showMoveDialog('${f.id}','${f.propId}','${f.folderName}')">変更</button></td></tr>`;}).join('')}</tbody></table></div></div>`;
}

function filterFiles(cat,el){currentFileFilter=cat;document.querySelectorAll('.fct').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderFiles();}

async function showMoveDialog(fileId,propId,currentFolder){
  const prop=properties.find(p=>p.id===propId);if(!prop)return;
  const newFolder=prompt(`振り分け先を変更します。\n現在: ${currentFolder}\n\n選択肢:\n${SUB_FOLDERS.join('\n')}`);
  if(!newFolder||!SUB_FOLDERS.includes(newFolder)||newFolder===currentFolder)return;
  if(!prop.subFolders[newFolder]){showToast('先に「分析」→「フォルダを作成／確認」を実行してください','error');return;}
  try{showToast('移動中…','info');await moveFileToDrive(fileId,prop.subFolders[newFolder]);showToast(`${newFolder} に移動しました`,'success');await loadDriveFiles();renderFiles();}
  catch(e){showToast('移動エラー: '+e.message,'error');}
}

function renderSettings(){
  const months=Array.from({length:12},(_,i)=>i+1);
  document.getElementById('pages').innerHTML=`<div class="card"><div class="ct" style="margin-bottom:10px">全般設定</div>
    <table><tbody>
      <tr><td style="color:#888;width:160px">決算月</td><td><select id="stFiscalMonth" onchange="fiscalMonth=parseInt(this.value);saveFiscal();showToast('決算月を変更しました','success')">${months.map(m=>`<option value="${m}" ${m===fiscalMonth?'selected':''}>${m}月（${m===12?1:m+1}月〜${m}月）</option>`).join('')}</select></td></tr>
      <tr><td style="color:#888">年間期間の計算</td><td><select id="stYearMode" onchange="yearMode=this.value;saveFiscal();showToast('年間期間を変更しました','success')"><option value="fiscal" ${yearMode==='fiscal'?'selected':''}>決算年度（決算月基準）</option><option value="calendar" ${yearMode==='calendar'?'selected':''}>暦年（1月〜12月）</option></select></td></tr>
      <tr><td style="color:#888">Google Drive</td><td><span class="badge ${accessToken?'bg':'br-b'}">${accessToken?'接続済':'未接続'}</span></td></tr>
    </tbody></table></div>
  <div class="card"><div class="flex-b" style="margin-bottom:10px"><span class="ct">物件一覧</span><button class="btn btn-b" onclick="document.getElementById('addPropModal').classList.add('open')">+ 物件追加</button></div>
    <table><thead><tr><th>物件名</th><th>種別</th><th>部屋数</th><th>Drive</th><th></th></tr></thead><tbody>
      ${properties.map(p=>`<tr><td>${p.name}</td><td><span class="badge bb">${p.type}</span></td><td>${p.rooms.length}室</td><td><span class="badge ${p.folderId?'bg':'br-b'}">${p.folderId?'作成済':'未作成'}</span></td><td><button class="btn" style="font-size:10px" onclick="deleteProp('${p.id}')">削除</button></td></tr>`).join('')}
    </tbody></table></div>`;
}

async function addNewProperty(){
  const name=document.getElementById('newPropName').value.trim();const type=document.getElementById('newPropType').value;
  if(!name){showToast('物件名を入力してください','error');return;}
  const units=parseInt(document.getElementById('newPropUnits').value)||1;
  const price=parseInt(document.getElementById('newPropPrice').value)||0;
  const selfInput=parseInt(document.getElementById('newPropSelf').value)||0;
  const loan=parseInt(document.getElementById('newPropLoan').value)||0;
  const rooms=Array.from({length:units},(_,i)=>({no:units===1?'全室':String(101+i),layout:'',area:null,status:'occupied',since:today(),note:'',items:[{label:'家賃',amt:0}]}));
  const newProp={id:'p'+Date.now(),name,type,addr:document.getElementById('newPropAddr').value,builtYear:parseInt(document.getElementById('newPropBuilt').value)||null,builtMonth:null,floors:null,structure:document.getElementById('newPropStruct').value,area:null,units,acquireDate:today(),price,reform:0,miscCost:0,loan,debt:loan,loanSegs:[{id:0,startYM:nowYM(),rate:1.5,years:35,loan}],folderId:null,subFolders:{},origRent:0,origNet:0,rooms};
  properties.push(newProp);saveProps();buildPropSelector();closeModal('addPropModal');
  showToast(`${name} を追加しました。フォルダを作成中…`,'info');
  try{await ensurePropFolders(newProp);showToast(`${name} のフォルダをDriveに作成しました`,'success');}catch(e){showToast('フォルダ作成エラー: '+e.message,'error');}
  showIconPage('settings');
}

function deleteProp(id){if(!confirm('この物件を削除しますか？\n（Driveのフォルダは削除されません）'))return;properties=properties.filter(p=>p.id!==id);saveProps();buildPropSelector();renderSettings();}

function closeModal(id){document.getElementById(id).classList.remove('open');pendingUpload=null;}

function showToast(msg,type='info'){
  const icons={success:'✓',error:'✕',info:'ℹ'};const el=document.createElement('div');el.className=`toast ${type}`;el.innerHTML=`<span>${icons[type]}</span><span>${msg}</span>`;document.getElementById('toastArea').appendChild(el);setTimeout(()=>el.remove(),4000);
}
</script>
